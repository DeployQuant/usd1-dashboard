};

const PRIORITY_CFG = {
  "critical": { label:"CRITICAL", color:"#EF4444" },
  "high":     { label:"HIGH",     color:"#F59E0B" },
  "medium":   { label:"MED",      color:"#64748B" },
};

const STATUS_ORDER = ["complete","live","in-flight","in-progress","audit-gated","open","planned","blocked","overdue"];

function StatusBadge({ status, small }) {
  const s = STATUS_CFG[status] || STATUS_CFG["open"];
  return (
    <span style={{display:"inline-flex",alignItems:"center",gap:5,padding:small?"2px 6px":"3px 8px",borderRadius:3,background:s.bg,border:`1px solid ${s.color}22`,fontSize:small?9:10,fontFamily:"'JetBrains Mono',monospace",fontWeight:600,color:s.color,letterSpacing:"0.08em",whiteSpace:"nowrap"}}>
      <span style={{width:5,height:5,borderRadius:"50%",background:s.dot,flexShrink:0,animation:["in-flight","in-progress"].includes(status)?"pulse-dot 1.6s ease infinite":"none"}}/>
      {s.label}
    </span>
  );
}

function TaskRow({ task, onStatusChange }) {
  const [open, setOpen] = useState(false);
  const p = PRIORITY_CFG[task.priority] || PRIORITY_CFG["medium"];
  return (
    <div style={{background:"#0D1524",border:`1px solid ${task.status==="blocked"||task.status==="overdue"?"#EF444430":"#1E293B"}`,borderRadius:6,padding:"10px 14px",display:"flex",alignItems:"center",gap:10,position:"relative"}}>
      <div onClick={()=>onStatusChange(task.id, task.status==="complete"?"open":"complete")} style={{width:16,height:16,borderRadius:3,flexShrink:0,border:`2px solid ${task.status==="complete"?TEAM.color:"#334155"}`,background:task.status==="complete"?TEAM.color:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s"}}>
        {task.status==="complete" && <span style={{fontSize:9,color:"#fff",lineHeight:1}}>✓</span>}
      </div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:13,color:task.status==="complete"?"#475569":"#CBD5E1",textDecoration:task.status==="complete"?"line-through":"none",lineHeight:1.4}}>{task.text}</div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
        <span style={{fontSize:9,fontFamily:"'JetBrains Mono',monospace",fontWeight:700,color:p.color}}>{p.label}</span>
        <div style={{position:"relative"}}>
          <div onClick={()=>setOpen(!open)} style={{cursor:"pointer"}}><StatusBadge status={task.status} small /></div>
          {open && (
            <div style={{position:"absolute",right:0,top:"calc(100% + 4px)",zIndex:100,background:"#0F1929",border:"1px solid #1E293B",borderRadius:6,padding:4,minWidth:130,boxShadow:"0 8px 24px rgba(0,0,0,0.5)"}}>
              {STATUS_ORDER.map(st => (
                <div key={st} onClick={()=>{onStatusChange(task.id,st);setOpen(false);}} style={{padding:"6px 8px",borderRadius:4,cursor:"pointer",background:task.status===st?"#1E293B":"transparent"}}>
                  <StatusBadge status={st} small/>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function App() {

  const [saving, setSaving] = useState(false);
  const [lastSaved, setLastSaved] = useState(null);
  const [openPhases, setOpenPhases] = useState({0:true,1:true,2:true});

  const phases = ALL_TASKS[TEAM.id] || [];

  useEffect(() => {
    fetch('/api/tasks', {headers:{Authorization:'Basic ' + btoa(window.__CREDS__)}})
      .then(r=>r.json()).then(d=>setTaskData(d)).catch(()=>{});
  }, []);

  const handleStatusChange = useCallback((taskId, newStatus) => {
    setTaskData(prev => {
      const updated = {...prev, [taskId]: newStatus};
      setSaving(true);
      fetch(`/api/tasks/${taskId}`, {
        method:'PUT',
        headers:{'Content-Type':'application/json','Authorization':'Basic ' + btoa(window.__CREDS__)},
        body:JSON.stringify({status:newStatus})
      }).finally(()=>{setSaving(false);setLastSaved(new Date());});
      return updated;
    });
  }, []);

  const allTasks = phases.flatMap(p => p.tasks.map(t=>({...t, status: taskData[t.id]||t.status})));
  const total = allTasks.length;
  const done = allTasks.filter(t=>t.status==="complete"||t.status==="live").length;
  const active = allTasks.filter(t=>["in-flight","in-progress"].includes(t.status)).length;
  const blocked = allTasks.filter(t=>t.status==="blocked"||t.status==="overdue").length;

  return (
    <div style={{minHeight:"100vh",background:"#080C14",color:"#E2E8F0"}}>
      <div style={{background:"#0A1120",borderBottom:"1px solid #1E293B",padding:"0 24px",display:"flex",alignItems:"center",justifyContent:"space-between",height:56,position:"sticky",top:0,zIndex:50}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:28,height:28,borderRadius:6,background:"linear-gradient(135deg,#1D4ED8 0%,#7C3AED 100%)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700}}>W</div>
          <div>
            <div style={{fontSize:13,fontWeight:700,lineHeight:1}}>USD1 · {TEAM.name}</div>
            <div style={{fontSize:9,color:"#475569",letterSpacing:"0.12em"}}>{TEAM.pillar} · EXECUTION TRACKER</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          {saving && <span style={{fontSize:10,color:"#F59E0B",fontFamily:"'JetBrains Mono',monospace"}}>SAVING...</span>}
          {lastSaved && !saving && <span style={{fontSize:10,color:"#334155",fontFamily:"'JetBrains Mono',monospace"}}>SAVED {lastSaved.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span>}
          <div style={{background:"#0D1524",border:`1px solid ${TEAM.color}33`,borderRadius:4,padding:"4px 10px",fontSize:10,color:TEAM.color,fontFamily:"'JetBrains Mono',monospace",fontWeight:700}}>● LIVE</div>
        </div>
      </div>

      <div style={{maxWidth:900,margin:"0 auto",padding:"32px 24px"}}>
        <div style={{background:`linear-gradient(135deg,${TEAM.color}18 0%,transparent 60%)`,border:`1px solid ${TEAM.color}30`,borderRadius:12,padding:"24px 28px",marginBottom:24}}>
          <div style={{fontSize:11,color:TEAM.color,fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.12em",marginBottom:6}}>{TEAM.pillar} · {TEAM.name.toUpperCase()}</div>
          <div style={{fontSize:26,fontWeight:700,marginBottom:4}}>Your Execution Dashboard</div>
          <div style={{fontSize:13,color:"#64748B"}}>Team Lead: <span style={{color:"#94A3B8",fontWeight:600}}>{TEAM.lead}</span></div>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:24}}>
          {[
            {label:"TOTAL",val:total,color:"#94A3B8"},
            {label:"COMPLETE",val:done,color:"#10B981"},
            {label:"ACTIVE",val:active,color:TEAM.color},
            {label:"BLOCKED",val:blocked,color:blocked>0?"#EF4444":"#334155"},

            <div key={m.label} style={{background:"#0D1524",border:`1px solid ${m.color}22`,borderRadius:8,padding:"14px 16px",textAlign:"center"}}>
              <div style={{fontSize:28,fontWeight:700,color:m.color,fontFamily:"'JetBrains Mono',monospace",lineHeight:1}}>{m.val}</div>
              <div style={{fontSize:9,color:"#475569",letterSpacing:"0.1em",marginTop:6}}>{m.label}</div>
            </div>
          ))}
        </div>

            <span style={{fontSize:12,fontWeight:600,color:"#94A3B8",fontFamily:"'JetBrains Mono',monospace"}}>OVERALL PROGRESS</span>
            <span style={{fontSize:16,fontWeight:700,color:TEAM.color,fontFamily:"'JetBrains Mono',monospace"}}>{pct}%</span>
          </div>
          <div style={{height:8,background:"#1E293B",borderRadius:4,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${pct}%`,background:TEAM.color,borderRadius:4,transition:"width 0.8s cubic-bezier(0.4,0,0.2,1)"}}/>

            <span style={{fontSize:10,color:"#334155",fontFamily:"'JetBrains Mono',monospace"}}>{done} of {total} tasks complete</span>
            <span style={{fontSize:10,color:"#334155",fontFamily:"'JetBrains Mono',monospace"}}>{total - done} remaining</span>

        </div>

        {phases.map((phase, pi) => {
          const phaseTasks = phase.tasks.map(t=>({...t,status:taskData[t.id]||t.status}));
          const pDone = phaseTasks.filter(t=>t.status==="complete"||t.status==="live").length;
          const isOpen = openPhases[pi] !== false;
          const critOpen = phaseTasks.filter(t=>t.priority==="critical"&&!["complete","live","in-flight","in-progress"].includes(t.status)).length;
          return (
            <div key={pi} style={{marginBottom:16}}>
              <div onClick={()=>setOpenPhases(p=>({...p,[pi]:!p[pi]}))} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",background:"#0D1524",border:`1px solid ${isOpen?TEAM.color+"30":"#1E293B"}`,borderRadius:isOpen?"8px 8px 0 0":8,cursor:"pointer"}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{width:8,height:8,borderRadius:"50%",background:pDone===phaseTasks.length?"#10B981":TEAM.color}}/>
                  <span style={{fontSize:13,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",color:"#E2E8F0"}}>{phase.phase}</span>
                  {critOpen>0 && <span style={{fontSize:9,color:"#EF4444",fontFamily:"'JetBrains Mono',monospace",background:"#EF444415",padding:"2px 6px",borderRadius:3}}>{critOpen} CRITICAL OPEN</span>}
                </div>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:11,fontFamily:"'JetBrains Mono',monospace",color:"#475569"}}>{pDone}/{phaseTasks.length}</span>
                  <div style={{width:80,height:3,background:"#1E293B",borderRadius:2,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${(pDone/phaseTasks.length)*100}%`,background:TEAM.color,borderRadius:2,transition:"width 0.5s"}}/>
                  </div>
                  <span style={{fontSize:10,color:"#475569"}}>{isOpen?"▲":"▼"}</span>
                </div>
              </div>
              {isOpen && (
                <div style={{border:`1px solid ${TEAM.color}20`,borderTop:"none",borderRadius:"0 0 8px 8px",padding:8,display:"flex",flexDirection:"column",gap:4,background:"#080C14"}}>
                  {phaseTasks.map(task=>(
                    <TaskRow key={task.id} task={task} onStatusChange={handleStatusChange}/>
                  ))}
                </div>
              )}
            </div>
          );
        })}

        <div style={{marginTop:32,padding:"16px 20px",background:"#0D1524",border:"1px solid #1E293B",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <span style={{fontSize:11,color:"#334155",fontFamily:"'JetBrains Mono',monospace"}}>USD1 Strategic Dominance Roadmap · {TEAM.pillar}</span>
          <span style={{fontSize:11,color:"#334155",fontFamily:"'JetBrains Mono',monospace"}}>Status updates sync to leadership in real time</span>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
