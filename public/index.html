  "critical": { label:"CRITICAL", color:"#EF4444" },
  "high":     { label:"HIGH",     color:"#F59E0B" },
  "medium":   { label:"MED",      color:"#64748B" },

const STATUS_ORDER = ["complete","live","in-flight","in-progress","audit-gated","open","planned","blocked","overdue"];

function calcScore(team, taskData) {
  const all = team.phases.flatMap(p => p.tasks);
  const total = all.length;
  const done  = all.filter(t => { const s = taskData[t.id]||t.status; return s==="complete"||s==="live"; }).length;
  const active= all.filter(t => { const s = taskData[t.id]||t.status; return ["in-flight","in-progress","audit-gated"].includes(s); }).length;
  const blocked = all.filter(t => { const s = taskData[t.id]||t.status; return s==="blocked"||s==="overdue"; }).length;
  return { total, done, active, blocked, pct: total ? Math.round((done/total)*100) : 0 };
}

function StatusBadge({ status, small }) {
  const s = STATUS_CFG[status] || STATUS_CFG["open"];
  return (
    <span style={{display:"inline-flex",alignItems:"center",gap:5,padding:small?"2px 6px":"3px 8px",borderRadius:3,background:s.bg,border:`1px solid ${s.color}22`,fontSize:small?9:10,fontFamily:"'JetBrains Mono',monospace",fontWeight:600,color:s.color,letterSpacing:"0.08em",whiteSpace:"nowrap"}}>
      <span style={{width:5,height:5,borderRadius:"50%",background:s.dot,flexShrink:0,animation:["in-flight","in-progress"].includes(status)?"pulse-dot 1.6s ease infinite":"none"}}/>
      {s.label}
    </span>
  );
}

function ProgressRing({ pct, color, size=52, stroke=4 }) {
  const r = (size-stroke)/2;
  const circ = 2*Math.PI*r;
  const dash = (pct/100)*circ;
  return (
    <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#1E293B" strokeWidth={stroke}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={`${dash} ${circ}`} strokeLinecap="round" style={{transition:"stroke-dasharray 0.8s cubic-bezier(0.4,0,0.2,1)"}}/>
    </svg>
  );
}

function TaskRow({ task, onStatusChange, teamColor }) {
  const [open, setOpen] = useState(false);
  const s = STATUS_CFG[task.status] || STATUS_CFG["open"];
  const p = PRIORITY_CFG[task.priority] || PRIORITY_CFG["medium"];
  return (
    <div style={{background:"#0D1524",border:`1px solid ${task.status==="blocked"||task.status==="overdue"?"#EF444430":"#1E293B"}`,borderRadius:6,padding:"10px 14px",display:"flex",alignItems:"center",gap:10,position:"relative"}}>
      <div onClick={()=>onStatusChange(task.id, task.status==="complete"?"open":"complete")} style={{width:16,height:16,borderRadius:3,flexShrink:0,border:`2px solid ${task.status==="complete"?teamColor:"#334155"}`,background:task.status==="complete"?teamColor:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s"}}>
        {task.status==="complete" && <span style={{fontSize:9,color:"#fff",lineHeight:1}}>✓</span>}
      </div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:13,color:task.status==="complete"?"#475569":"#CBD5E1",textDecoration:task.status==="complete"?"line-through":"none",lineHeight:1.4}}>{task.text}</div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
        <span style={{fontSize:9,fontFamily:"'JetBrains Mono',monospace",fontWeight:700,color:p.color}}>{p.label}</span>
        <div style={{position:"relative"}}>
          <div onClick={()=>setOpen(!open)} style={{cursor:"pointer"}}><StatusBadge status={task.status} small /></div>
          {open && (
            <div style={{position:"absolute",right:0,top:"calc(100% + 4px)",zIndex:100,background:"#0F1929",border:"1px solid #1E293B",borderRadius:6,padding:4,minWidth:130,boxShadow:"0 8px 24px rgba(0,0,0,0.5)"}}>

                  <StatusBadge status={st} small/>
                </div>
              ))}
            </div>
          )}

      </div>

function TeamDetail({ team, taskData, onStatusChange }) {
  const [openPhases, setOpenPhases] = useState({0:true,1:true,2:true});

    <div style={{animation:"fade-in 0.3s ease"}}>
      <div style={{background:`linear-gradient(135deg,${team.color}18 0%,transparent 60%)`,border:`1px solid ${team.color}30`,borderRadius:10,padding:"20px 24px",marginBottom:20}}>
        <div style={{fontSize:11,color:team.color,fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.12em",marginBottom:4}}>{team.pillar} · EXECUTION TRACKER</div>
        <div style={{fontSize:24,fontWeight:700,marginBottom:8}}>{team.name}</div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:12,color:"#64748B"}}>Team Lead:</span>
          <span style={{fontSize:12,fontFamily:"'JetBrains Mono',monospace",color:team.lead==="TBD"?"#475569":"#E2E8F0",fontStyle:team.lead==="TBD"?"italic":"normal"}}>{team.lead}</span>
        </div>
      </div>
      {team.phases.map((phase, pi) => {
        const phaseTasks = phase.tasks.map(t=>({...t,status:taskData[t.id]||t.status}));
        const done = phaseTasks.filter(t=>t.status==="complete"||t.status==="live").length;
        const isOpen = openPhases[pi] !== false;
        return (
          <div key={pi} style={{marginBottom:16}}>
            <div onClick={()=>togglePhase(pi)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 16px",background:"#0D1524",border:"1px solid #1E293B",borderRadius:isOpen?"8px 8px 0 0":8,cursor:"pointer"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:6,height:6,borderRadius:"50%",background:done===phaseTasks.length?"#10B981":team.color}}/>
                <span style={{fontSize:12,fontWeight:600,fontFamily:"'JetBrains Mono',monospace",color:"#94A3B8"}}>{phase.label}</span>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:11,fontFamily:"'JetBrains Mono',monospace",color:"#475569"}}>{done}/{phaseTasks.length} DONE</span>
                <div style={{width:80,height:3,background:"#1E293B",borderRadius:2,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${(done/phaseTasks.length)*100}%`,background:team.color,borderRadius:2,transition:"width 0.5s ease"}}/>
                </div>
                <span style={{fontSize:10,color:"#475569"}}>{isOpen?"▲":"▼"}</span>
              </div>
            </div>
            {isOpen && (
              <div style={{border:"1px solid #1E293B",borderTop:"none",borderRadius:"0 0 8px 8px",padding:8,display:"flex",flexDirection:"column",gap:4,background:"#080C14"}}>
                {phaseTasks.map(task=>(
                  <TaskRow key={task.id} task={task} teamColor={team.color} onStatusChange={onStatusChange}/>
                ))}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

  const blocked = allTasks.filter(t=>t.status==="blocked"||t.status==="overdue");

  return (

        ].map(m=>(
          <div key={m.label} style={{background:"#0D1524",border:`1px solid ${m.color}22`,borderRadius:8,padding:"14px 16px"}}>
            <div style={{fontSize:20,marginBottom:4}}>{m.icon}</div>
            <div style={{fontSize:26,fontWeight:700,color:m.color,fontFamily:"'JetBrains Mono',monospace",lineHeight:1}}>{m.val}</div>
            <div style={{fontSize:9,color:"#475569",letterSpacing:"0.1em",marginTop:4}}>{m.label}</div>
          </div>
        ))}
      </div>

      <div style={{background:"#0D1524",border:"1px solid #1E293B",borderRadius:8,padding:20}}>
        <div style={{fontSize:11,color:"#64748B",fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.1em",marginBottom:14}}>TEAM PERFORMANCE</div>
        {TEAMS.map(team=>{
          const s = calcScore(team, taskData);
          const isLow = s.pct < 10 && s.done < 2;
          return (
            <div key={team.id} style={{marginBottom:16,cursor:"pointer"}} onClick={()=>onSelectTeam(team.id)}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{width:8,height:8,borderRadius:"50%",background:team.color}}/>
                  <span style={{fontSize:13,fontWeight:600}}>{team.name}</span>
                  <span style={{fontSize:10,color:"#475569",fontFamily:"'JetBrains Mono',monospace"}}>{team.pillar}</span>
                  {isLow && <span style={{fontSize:9,color:"#EF4444",fontFamily:"'JetBrains Mono',monospace",background:"#EF444415",padding:"2px 6px",borderRadius:3}}>UNDERPERFORMING</span>}
                  {s.blocked>0 && <span style={{fontSize:9,color:"#F59E0B",fontFamily:"'JetBrains Mono',monospace",background:"#F59E0B15",padding:"2px 6px",borderRadius:3}}>{s.blocked} BLOCKED</span>}
                </div>
                <span style={{fontSize:12,fontFamily:"'JetBrains Mono',monospace",color:team.color,fontWeight:700}}>{s.pct}%</span>
              </div>
              <div style={{position:"relative",height:6,background:"#1E293B",borderRadius:3,overflow:"hidden"}}>
                <div style={{position:"absolute",left:0,top:0,height:"100%",width:`${s.pct}%`,background:team.color,borderRadius:3,transition:"width 0.8s cubic-bezier(0.4,0,0.2,1)"}}/>
                {s.active>0&&s.total>0&&<div style={{position:"absolute",left:`${s.pct}%`,top:0,height:"100%",width:`${(s.active/s.total)*100}%`,background:`${team.color}40`,borderRadius:"0 3px 3px 0"}}/>}
              </div>
            </div>
          );
        })}
      </div>

      {(blocked.length>0||criticalOpen.length>0) && (
        <div style={{background:"#0D1524",border:"1px solid #EF444425",borderRadius:8,padding:20}}>
          <div style={{fontSize:11,color:"#EF4444",fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.1em",marginBottom:14}}>⚑ REQUIRES LEADERSHIP ATTENTION</div>
          {[...blocked,...criticalOpen.filter(t=>!blocked.find(b=>b.id===t.id))].slice(0,8).map(t=>(
            <div key={t.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid #1E293B"}}>
              <div style={{width:6,height:6,borderRadius:"50%",background:t.teamColor,flexShrink:0}}/>
              <span style={{fontSize:11,color:"#94A3B8",fontFamily:"'JetBrains Mono',monospace",minWidth:80}}>{t.team.toUpperCase().slice(0,8)}</span>
              <span style={{flex:1,fontSize:12,color:"#CBD5E1"}}>{t.text}</span>
              <StatusBadge status={t.status} small/>
            </div>
          ))}
        </div>
      )}

      <div style={{background:"#0D1524",border:"1px solid #1E293B",borderRadius:8,padding:20}}>
        <div style={{fontSize:11,color:"#64748B",fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.1em",marginBottom:14}}>CROSS-TEAM TIMELINE</div>
        {["Phase 1 · Days 0–30","Phase 2 · Days 30–90","Phase 3 · Days 90–180"].map((phase,pi)=>{
          const phaseTasks = TEAMS.flatMap(t=>(t.phases[pi]?.tasks||[]).map(tk=>({...tk,status:taskData[tk.id]||tk.status,teamColor:t.color,teamName:t.name})));
          const done = phaseTasks.filter(t=>["complete","live"].includes(t.status)).length;
          return (
            <div key={phase} style={{marginBottom:16}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                <span style={{fontSize:12,fontWeight:600,color:"#94A3B8",fontFamily:"'JetBrains Mono',monospace"}}>{phase}</span>
                <span style={{fontSize:11,color:"#475569",fontFamily:"'JetBrains Mono',monospace"}}>{done}/{phaseTasks.length}</span>
              </div>
              <div style={{display:"flex",gap:2}}>
                {phaseTasks.map(t=>(
                  <div key={t.id} title={`${t.teamName}: ${t.text}`} style={{flex:1,height:8,borderRadius:2,background:["complete","live"].includes(t.status)?t.teamColor:["in-flight","in-progress"].includes(t.status)?`${t.teamColor}80`:t.status==="blocked"?"#EF4444":"#1E293B",transition:"all 0.3s"}}/>
                ))}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function App() {
  const [selectedTeam, setSelectedTeam] = useState(null);
  const [view, setView] = useState("overview");
  const [taskData, setTaskData] = useState({});
  const [lastUpdated, setLastUpdated] = useState(new Date());
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    fetch('/api/tasks').then(r=>r.json()).then(data=>setTaskData(data)).catch(()=>{});
  }, []);

  const handleStatusChange = useCallback((taskId, newStatus) => {
    setTaskData(prev => {
      const updated = {...prev, [taskId]: newStatus};
      setSaving(true);
      fetch(`/api/tasks/${taskId}`, {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:newStatus})})
        .finally(()=>setSaving(false));
      return updated;
    });
    setLastUpdated(new Date());
  }, []);

  const activeTeam = TEAMS.find(t=>t.id===selectedTeam);

  return (
    <div style={{minHeight:"100vh",background:"#080C14",color:"#E2E8F0"}}>
      {/* NAV */}
      <div style={{background:"#0A1120",borderBottom:"1px solid #1E293B",padding:"0 24px",display:"flex",alignItems:"center",justifyContent:"space-between",height:56,position:"sticky",top:0,zIndex:50}}>
        <div style={{display:"flex",alignItems:"center",gap:16}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:28,height:28,borderRadius:6,background:"linear-gradient(135deg,#1D4ED8 0%,#7C3AED 100%)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700}}>W</div>
            <div>
              <div style={{fontSize:13,fontWeight:700,lineHeight:1}}>USD1</div>
              <div style={{fontSize:9,color:"#475569",letterSpacing:"0.12em"}}>COMMAND CENTER</div>
            </div>
          </div>
          <div style={{width:1,height:20,background:"#1E293B"}}/>
          {["overview","search"].map(v=>(
            <button key={v} onClick={()=>setView(v)} style={{background:view===v?"#1E293B":"transparent",border:"none",borderRadius:5,padding:"5px 12px",color:view===v?"#E2E8F0":"#64748B",fontSize:12,fontWeight:600,cursor:"pointer"}}>
              {v==="overview"?"Overview":"All Tasks"}
            </button>
          ))}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          {saving && <span style={{fontSize:10,color:"#F59E0B",fontFamily:"'JetBrains Mono',monospace"}}>SAVING...</span>}
          <div style={{fontSize:10,color:"#334155",fontFamily:"'JetBrains Mono',monospace"}}>
            {lastUpdated.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}
          </div>
          <div style={{background:"#0D1524",border:"1px solid #10B98133",borderRadius:4,padding:"4px 10px",fontSize:10,color:"#10B981",fontFamily:"'JetBrains Mono',monospace",fontWeight:700}}>● LIVE</div>
        </div>
      </div>

      {/* LAYOUT */}
      <div style={{display:"flex",height:"calc(100vh - 56px)"}}>
        {/* SIDEBAR */}
        <div style={{width:240,flexShrink:0,background:"#0A1120",borderRight:"1px solid #1E293B",padding:16,overflowY:"auto",display:"flex",flexDirection:"column",gap:6}}>
          <div style={{fontSize:9,color:"#334155",fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.12em",marginBottom:4,paddingLeft:2}}>TEAMS</div>
          <div onClick={()=>{setSelectedTeam(null);setView("overview");}} style={{padding:"8px 12px",borderRadius:6,background:view==="overview"&&!selectedTeam?"#1E293B":"transparent",border:`1px solid ${view==="overview"&&!selectedTeam?"#334155":"transparent"}`,cursor:"pointer",display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:12}}>◈</span>
            <span style={{fontSize:13,fontWeight:600,color:view==="overview"&&!selectedTeam?"#E2E8F0":"#64748B"}}>All Teams</span>
          </div>
          <div style={{height:1,background:"#1E293B",margin:"4px 0"}}/>
          {TEAMS.map(team=>{
            const s = calcScore(team, taskData);
            const selected = selectedTeam===team.id;
            const isLow = s.pct<10&&s.done<2;
            return (
              <div key={team.id} onClick={()=>{setSelectedTeam(team.id);setView("team");}} style={{padding:"9px 12px",borderRadius:6,background:selected?`${team.color}15`:"transparent",border:`1px solid ${selected?`${team.color}40`:"transparent"}`,cursor:"pointer"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{width:8,height:8,borderRadius:"50%",background:team.color}}/>
                    <span style={{fontSize:13,fontWeight:600,color:selected?team.color:"#94A3B8"}}>{team.name}</span>
                  </div>
                  <span style={{fontSize:11,fontFamily:"'JetBrains Mono',monospace",color:team.color,fontWeight:700}}>{s.pct}%</span>
                </div>
                <div style={{marginTop:6,height:2,background:"#1E293B",borderRadius:1}}>
                  <div style={{height:"100%",width:`${s.pct}%`,background:team.color,borderRadius:1,transition:"width 0.5s"}}/>
                </div>
                {isLow && <div style={{marginTop:5,fontSize:9,color:"#EF4444",fontFamily:"'JetBrains Mono',monospace"}}>⚑ UNDERPERFORMING</div>}
                {s.blocked>0 && <div style={{marginTop:3,fontSize:9,color:"#F59E0B",fontFamily:"'JetBrains Mono',monospace"}}>⚠ {s.blocked} BLOCKED</div>}
              </div>
            );
          })}
          <div style={{marginTop:"auto",paddingTop:16,borderTop:"1px solid #1E293B"}}>
            <div style={{fontSize:9,color:"#334155",fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.12em",marginBottom:8}}>STATUS KEY</div>
            {["complete","in-flight","audit-gated","open","blocked"].map(s=>(
              <div key={s} style={{marginBottom:5}}><StatusBadge status={s} small/></div>
            ))}
          </div>
        </div>

        {/* CONTENT */}
        <div style={{flex:1,overflowY:"auto",padding:24}}>
          {view==="overview"&&!selectedTeam&&(
            <div>
              <div style={{marginBottom:20}}>
                <h1 style={{fontSize:22,fontWeight:700,marginBottom:4}}>Strategic Execution Dashboard</h1>
                <p style={{fontSize:13,color:"#64748B"}}>USD1 Strategic Dominance Roadmap · All Pillars · March 2026</p>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10,marginBottom:24}}>
                {TEAMS.map(team=>{
                  const s = calcScore(team,taskData);
                  return (
                    <div key={team.id} onClick={()=>{setSelectedTeam(team.id);setView("team");}} style={{background:`${team.color}08`,border:`1px solid ${selectedTeam===team.id?team.color:"#1E293B"}`,borderRadius:8,padding:"16px 18px",cursor:"pointer",position:"relative",overflow:"hidden"}}>
                      <div style={{position:"absolute",left:0,top:0,bottom:0,width:3,background:team.color,opacity:0.7,borderRadius:"3px 0 0 3px"}}/>
                      <div style={{paddingLeft:8}}>
                        <div style={{fontSize:9,color:"#64748B",fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.1em",marginBottom:3}}>{team.pillar}</div>
                        <div style={{fontSize:14,fontWeight:700,color:"#E2E8F0",marginBottom:12}}>{team.name}</div>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                          <div style={{position:"relative"}}>
                            <ProgressRing pct={s.pct} color={team.color}/>
                            <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:team.color,fontFamily:"'JetBrains Mono',monospace"}}>{s.pct}%</div>
                          </div>
                          <div>
                            <div style={{fontSize:18,fontWeight:700,color:team.color,fontFamily:"'JetBrains Mono',monospace"}}>{s.done}/{s.total}</div>
                            <div style={{fontSize:9,color:"#475569"}}>DONE</div>
                          </div>
                        </div>
                        {s.blocked>0&&<div style={{background:"#EF444415",border:"1px solid #EF444430",borderRadius:4,padding:"3px 8px",fontSize:10,color:"#EF4444",fontFamily:"'JetBrains Mono',monospace"}}>⚠ {s.blocked} BLOCKED</div>}
                      </div>
                    </div>
                  );
                })}
              </div>
              <OverviewGrid taskData={taskData} onSelectTeam={(id)=>{setSelectedTeam(id);setView("team");}}/>
            </div>
          )}

          {view==="team"&&activeTeam&&(
            <div>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:20}}>
                <button onClick={()=>{setSelectedTeam(null);setView("overview");}} style={{background:"transparent",border:"none",color:"#64748B",cursor:"pointer",fontSize:12}}>← Overview</button>
                <span style={{color:"#334155"}}>/</span>
                <span style={{fontSize:12,color:activeTeam.color,fontFamily:"'JetBrains Mono',monospace"}}>{activeTeam.name}</span>
              </div>
              <TeamDetail team={activeTeam} taskData={taskData} onStatusChange={handleStatusChange}/>
            </div>
          )}

          {view==="search"&&(
            <div>
              <h2 style={{fontSize:18,fontWeight:700,marginBottom:16}}>All Initiatives</h2>
              {TEAMS.map(team=>(
                <div key={team.id} style={{marginBottom:24}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                    <div style={{width:8,height:8,borderRadius:"50%",background:team.color}}/>
                    <span style={{fontSize:13,fontWeight:700,color:team.color}}>{team.name}</span>
                    <span style={{fontSize:10,color:"#475569",fontFamily:"'JetBrains Mono',monospace"}}>{team.pillar}</span>
                  </div>
                  {team.phases.map((phase,pi)=>(
                    <div key={pi} style={{marginBottom:8}}>
                      <div style={{fontSize:10,color:"#334155",fontFamily:"'JetBrains Mono',monospace",marginBottom:4,paddingLeft:4}}>{phase.label}</div>
                      <div style={{display:"flex",flexDirection:"column",gap:4}}>
                        {phase.tasks.map(task=>(
                          <TaskRow key={task.id} task={{...task,status:taskData[task.id]||task.status}} teamColor={team.color} onStatusChange={handleStatusChange}/>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
